<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="FRIDAY HUD logo">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#072a5e"/>
      <stop offset="100%" stop-color="#03142c"/>
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74f7ff"/>
      <stop offset="100%" stop-color="#25b7ff"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g transform="translate(512,512)" stroke="url(#glow)" fill="none" filter="url(#softGlow)">
    <circle r="410" stroke-width="4" opacity="0.25"/>
    <circle r="360" stroke-width="10" stroke-dasharray="220 90 130 70" opacity="0.85"/>
    <circle r="305" stroke-width="3" stroke-dasharray="5 18" opacity="0.55"/>
    <circle r="250" stroke-width="14" stroke-dasharray="180 60 70 55" opacity="0.85"/>
    <circle r="192" stroke-width="5" stroke-dasharray="12 16" opacity="0.65"/>
    <circle r="155" stroke-width="10" opacity="0.9"/>

    <path d="M -340 -130 A 365 365 0 0 1 -130 -340" stroke-width="10" opacity="0.8"/>
    <path d="M 120 -345 A 365 365 0 0 1 335 -140" stroke-width="10" opacity="0.8"/>
    <path d="M -110 340 A 355 355 0 0 1 -340 110" stroke-width="10" opacity="0.8"/>
    <path d="M 345 95 A 358 358 0 0 1 110 345" stroke-width="10" opacity="0.8"/>

    <circle r="120" stroke-width="2" opacity="0.9"/>
    <circle r="118" stroke-width="28" opacity="0.08"/>
  </g>

  <g transform="translate(512,512)" text-anchor="middle" fill="#b8f8ff" font-family="Segoe UI, Arial, sans-serif">
    <text y="18" font-size="84" font-weight="700" letter-spacing="8">FRIDAY</text>
    <text y="72" font-size="22" opacity="0.8" letter-spacing="3">CURRENT AFFAIRS CORE</text>
  </g>
</svg>
